# Source omarchy base config
source-file ~/.config/tmux/tmux.conf

# Override reload to use this file (not omarchy's)
unbind q
bind q source-file ~/.tmux.conf

# Override: Rebind horizontal split from h to - (s is list sessions)
unbind h
bind - split-window -v -c "#{pane_current_path}"

# Override: hjkl pane navigation (unbind k from kill-window first)
unbind k
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Rebind kill-window to X (was k)
bind X kill-window
